spring:
  application:
    name: MedicineNotes

  datasource:
    url: jdbc:postgresql://localhost:5433/medicinenotes
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

jwt:
  lifetime: ${JWT_LIFETIME}
  secret: ${JWT_SECRET}

limits:
  max-templates: ${LIMITS_MAX_TEMPLATES}
  max-duration: ${LIMITS_MAX_DURATION}
  max-times-a-day: ${LIMITS_MAX_TIMES_A_DAY}

cache:
  names:
    - intake
    - template

spring.datasource.hikari:
  maximum-pool-size: 10
  minimum-idle: 5
  connection-timeout: 30000
  idle-timeout: 600000
  max-lifetime: 1800000