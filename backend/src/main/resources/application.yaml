spring:
  application:
    name: MedicineNotes

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: ${REDIS_DATABASE}
      password: ${REDIS_PASSWORD}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

jwt:
  lifetime: ${JWT_LIFETIME}
  secret: ${JWT_SECRET}

limits:
  max-templates: ${LIMITS_MAX_TEMPLATES}
  max-duration: ${LIMITS_MAX_DURATION}
  max-times-a-day: ${LIMITS_MAX_TIMES_A_DAY}
  max-code-attempts: ${MAX_CODE_ATTEMPTS}
  max-send-mail: ${MAX_SEND_MAIL}

redis:
  timeout:
    code: ${REDIS_TIMEOUT_CODE}
    attempts: ${REDIS_TIMEOUT_ATTEMPTS}
    send: ${REDIS_TIMEOUT_SEND}

cache:
  names:
    - intake
    - template