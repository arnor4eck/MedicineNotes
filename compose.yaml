services:
  postgres:
    image: 'postgres:18'
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # db
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL: update
      # jwt
      JWT_SECRET: ${JWT_SECRET}
      JWT_LIFETIME: ${JWT_LIFETIME}
      # limits
      LIMITS_MAX_TEMPLATES: ${LIMITS_MAX_TEMPLATES}
      LIMITS_MAX_DURATION: ${LIMITS_MAX_DURATION}
      LIMITS_MAX_TIMES_A_DAY: ${LIMITS_MAX_TIMES_A_DAY}
      MAX_CODE_ATTEMPTS: ${MAX_CODE_ATTEMPTS}
      MAX_SEND_MAIL: ${MAX_SEND_MAIL}
      # mail
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # redis
      REDIS_TIMEOUT_CODE: ${REDIS_TIMEOUT_CODE}
      REDIS_TIMEOUT_ATTEMPTS: ${REDIS_TIMEOUT_ATTEMPTS}
      REDIS_TIMEOUT_SEND: ${REDIS_TIMEOUT_SEND}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DATABASE: ${REDIS_DATABASE}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: java -jar app.jar
  redis:
    image: 'redis:alpine'
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
    - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - app-network

volumes:
  postgres_data:
  redis-data:

networks:
  app-network:
    driver: bridge